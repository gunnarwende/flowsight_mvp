<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Time-Jump</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh;
    background: #0b1220;  /* default dark navy — overridden via CONFIG.brand */
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #fff;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, var(--bg-light) 0%, var(--bg-dark) 80%);
    opacity: 0;
    animation: fadeIn 450ms ease-out forwards, fadeOut 450ms ease-in 1050ms forwards;
  }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

  .label {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.62);
    margin-bottom: 24px;
  }
  .date {
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -2px;
    color: rgba(255,255,255,0.95);
  }
  .sub {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.5);
    margin-top: 18px;
  }
</style>
</head>
<body>
  <div class="label" id="label">Einen Tag später</div>
  <div class="date" id="date">—</div>
  <div class="sub" id="sub">—</div>

<script>
const CONFIG = {
  label: "{{LABEL}}",
  date: "{{DATE}}",
  sub: "{{SUB}}",
  brand: "{{BRAND}}"
};

function hexToRgb(h) {
  const v = h.replace(/^#/, "");
  const num = parseInt(v, 16);
  return [num >> 16 & 0xff, num >> 8 & 0xff, num & 0xff];
}
function adjust(rgb, factor) {
  return `rgb(${rgb.map((v) => Math.max(0, Math.min(255, Math.round(v * factor)))).join(",")})`;
}

const rgb = hexToRgb(CONFIG.brand || "#0b1220");
document.documentElement.style.setProperty("--bg-light", adjust(rgb, 0.35));
document.documentElement.style.setProperty("--bg-dark",  adjust(rgb, 0.15));

document.getElementById("label").textContent = CONFIG.label;
document.getElementById("date").textContent = CONFIG.date;
document.getElementById("sub").textContent = CONFIG.sub;
</script>
</body>
</html>
