<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SMS Frame</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1440px; height: 900px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  body {
    position: relative;
    background: radial-gradient(ellipse at center, var(--bg-light) 0%, var(--bg-dark) 80%);
  }

  /* Phone mockup centered */
  .phone-mock {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 418px;   /* 412 content + 3px bezel each side */
    height: 864px;  /* 858 content + 3px bezel each side */
    background: #1a1a1e;
    border-radius: 40px;
    padding: 10px;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.45),
      0 0 0 1px rgba(255, 255, 255, 0.04) inset,
      0 0 0 2px rgba(0, 0, 0, 0.6);
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: #fff;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
  }

  /* Status-bar (simplified, passend zur aktuellen Szenen-Zeit) */
  .status-bar {
    height: 30px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
    border-bottom: 1px solid #f1f1f1;
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; }
  .status-bar svg { width: 15px; height: 15px; }

  /* Messaging header */
  .msg-header {
    padding: 18px 14px 12px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
  }
  .msg-header .back { width: 24px; height: 24px; color: #1a1a1a; }
  .msg-header .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--brand, #2563eb);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .msg-header .name { font-size: 16px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .msg-header .info { width: 20px; height: 20px; color: #888; }

  /* Thread */
  .thread {
    padding: 12px 14px 90px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: calc(100% - 84px);
    overflow-y: auto;
  }
  .thread::-webkit-scrollbar { display: none; }
  .date-sep {
    text-align: center;
    font-size: 11px;
    color: #b0b0b0;
    letter-spacing: 0.4px;
    margin: 4px 0;
  }
  .bubble {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 18px;
    background: #f1f1f4;
    color: #1a1a1a;
    line-height: 1.4;
    font-size: 13px;
    word-wrap: break-word;
  }
  .bubble .meta {
    font-size: 10px;
    color: #999;
    margin-top: 4px;
  }
  .bubble .link {
    color: #2563eb;
    word-break: break-all;
  }
  .bubble.new {
    animation: flyIn 500ms cubic-bezier(0.2, 0, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(8px);
  }
  @keyframes flyIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Nav */
  .nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: #fff;
    border-top: 1px solid #eee;
  }
  .nav .dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; }
</style>
</head>
<body>
  <div class="phone-mock">
    <div class="phone-screen">
      <div class="status-bar">
        <span id="clock">—</span>
        <div class="right">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20Zm-3 15 5-3-5-3v6Z" opacity=".7"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4a8 8 0 0 1 8 8v4h-2v-4a6 6 0 0 0-12 0v4H4v-4a8 8 0 0 1 8-8Z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 16h4V8H2v8Zm6 0h4V4H8v12Zm6 0h4v-8h-4v8Zm6 0h2V4h-2v12Z"/></svg>
          <span style="font-weight:700;font-size:11px;">86</span>
        </div>
      </div>
      <div class="msg-header">
        <svg class="back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <div class="avatar" id="avatar">DA</div>
        <div class="name" id="senderName">Dörfler AG</div>
        <svg class="info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      </div>
      <div class="thread" id="thread"></div>
      <div class="nav">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

<script>
const CONFIG = {
  sender: "{{SENDER}}",
  brand: "{{BRAND}}",
  firma: "{{FIRMA}}",
  caseId: "{{CASE_ID}}",
  reviewToken: "{{REVIEW_TOKEN}}",
  clock: "{{CLOCK}}",      // z.B. "09:00" (Tag+1) oder "10:31" (Tag+2)
  displayPhone: "{{DISPLAY_PHONE}}",
  times: {
    sms1: "{{SMS1_TIME}}",
    sms2: "{{SMS2_TIME}}",
    sms3: "{{SMS3_TIME}}",
  },
  dates: {
    day0: "{{DAY0_DATE}}",
    day1: "{{DAY1_DATE}}",
    day2: "{{DAY2_DATE}}",
  },
};

function hexToRgb(h) {
  const v = h.replace(/^#/, "");
  const num = parseInt(v, 16);
  return [num >> 16 & 0xff, num >> 8 & 0xff, num & 0xff];
}
function adjust(rgb, factor) {
  return `rgb(${rgb.map((v) => Math.max(0, Math.min(255, Math.round(v * factor)))).join(",")})`;
}

const rgb = hexToRgb(CONFIG.brand || "#0b1220");
document.documentElement.style.setProperty("--bg-light", adjust(rgb, 0.4));
document.documentElement.style.setProperty("--bg-dark", adjust(rgb, 0.12));
document.documentElement.style.setProperty("--brand", CONFIG.brand);

document.getElementById("senderName").textContent = CONFIG.sender;
document.getElementById("avatar").textContent = (CONFIG.sender || "XX").slice(0, 2).toUpperCase();
document.getElementById("clock").textContent = CONFIG.clock || "09:00";

const thread = document.getElementById("thread");

function addDateSep(label) {
  const div = document.createElement("div");
  div.className = "date-sep";
  div.textContent = label;
  thread.appendChild(div);
}

function addBubble(html, time, isNew) {
  const b = document.createElement("div");
  b.className = "bubble" + (isNew ? " new" : "");
  b.innerHTML = `${html}<div class="meta">${time}</div>`;
  thread.appendChild(b);
  // Scroll to bottom so new message is visible
  requestAnimationFrame(() => { thread.scrollTop = thread.scrollHeight; });
  return b;
}

window.addEventListener("DOMContentLoaded", () => {
  // Tag 0: Bestätigungs-SMS (schon vorhanden)
  addDateSep(CONFIG.dates.day0);
  addBubble(
    `<strong>${CONFIG.sender}:</strong> Ihre Meldung wurde aufgenommen. Hier können Sie Angaben ergänzen oder Fotos anfügen:<br><span class="link">flowsight.ch/v/${CONFIG.caseId}?t=${CONFIG.reviewToken.slice(0,8)}</span>`,
    CONFIG.times.sms1,
    false
  );
});

window.showReminder = () => {
  addDateSep(CONFIG.dates.day1);
  addBubble(
    `<strong>${CONFIG.sender}:</strong> Erinnerung — Ihr Termin ist morgen um 09:00 Uhr, Bahnhofstrasse 15. Bei Fragen erreichen Sie uns unter ${CONFIG.displayPhone}.`,
    CONFIG.times.sms2,
    true
  );
};

window.showReview = () => {
  addDateSep(CONFIG.dates.day2);
  addBubble(
    `<strong>${CONFIG.sender}:</strong> Vielen Dank für Ihr Vertrauen. Über eine kurze Bewertung freuen wir uns sehr:<br><span class="link">flowsight.ch/r/${CONFIG.caseId}?t=${CONFIG.reviewToken}</span>`,
    CONFIG.times.sms3,
    true
  );
};
</script>
</body>
</html>
