<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SMS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 412px; height: 915px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
    background: #ffffff;
    overflow: hidden;
    position: relative;
    font-size: 14px;
    color: #1a1a1a;
  }

  /* Status-bar wird in FFmpeg-Splice via vstack überlagert — hier nichts. */

  /* Samsung-Messaging Header */
  .sms-header {
    padding: 52px 16px 14px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
  }
  .sms-header .back {
    width: 24px; height: 24px;
    color: #1a1a1a;
  }
  .sms-header .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--brand, #2563eb);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
  }
  .sms-header .name {
    font-size: 17px; font-weight: 600; color: #1a1a1a;
    flex: 1;
  }
  .sms-header .info {
    width: 22px; height: 22px;
    color: #888;
  }

  /* Thread body */
  .thread {
    padding: 14px 16px 120px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    height: calc(100% - 100px);
    overflow: hidden;
  }
  .date-sep {
    text-align: center;
    font-size: 11px;
    color: #999;
    letter-spacing: 0.3px;
    margin: 4px 0;
  }

  .bubble {
    max-width: 82%;
    padding: 11px 14px;
    border-radius: 20px;
    background: #f1f1f4;
    color: #1a1a1a;
    line-height: 1.45;
    font-size: 13px;
    position: relative;
  }
  .bubble .meta {
    font-size: 10px;
    color: #999;
    margin-top: 4px;
  }
  .bubble .link {
    color: #2563eb;
    word-break: break-all;
  }
  .bubble.new {
    animation: flyIn 500ms cubic-bezier(0.2, 0, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(8px);
  }
  @keyframes flyIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Footer navigation icons (Samsung-like) */
  .nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: #fff;
    border-top: 1px solid #eee;
  }
  .nav .dot {
    width: 10px; height: 10px;
    background: #ccc;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="sms-header">
    <svg class="back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    <div class="avatar" id="avatar">DA</div>
    <div class="name" id="senderName">Dörfler AG</div>
    <svg class="info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
  </div>

  <div class="thread" id="thread">
    <!-- SMS will be injected via JS -->
  </div>

  <div class="nav">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

<script>
const CONFIG = {
  sender: "{{SENDER}}",
  brand: "{{BRAND}}",
  firma: "{{FIRMA}}",
  caseId: "{{CASE_ID}}",
  reviewToken: "{{REVIEW_TOKEN}}",
  times: {
    sms1: "{{SMS1_TIME}}",   // Bestätigung (aus Take 2 Flow)
    sms2: "{{SMS2_TIME}}",   // 24h-Reminder (neu)
    sms3: "{{SMS3_TIME}}",   // Bewertungsanfrage (neu)
  },
  dates: {
    day0: "{{DAY0_DATE}}",
    day1: "{{DAY1_DATE}}",
    day2: "{{DAY2_DATE}}",
  },
};

document.documentElement.style.setProperty("--brand", CONFIG.brand || "#2563eb");
document.getElementById("senderName").textContent = CONFIG.sender;
document.getElementById("avatar").textContent = (CONFIG.sender || "XX").slice(0, 2).toUpperCase();

const thread = document.getElementById("thread");

function addDateSep(label) {
  const div = document.createElement("div");
  div.className = "date-sep";
  div.textContent = label;
  thread.appendChild(div);
}

function addBubble(html, time, isNew) {
  const b = document.createElement("div");
  b.className = "bubble" + (isNew ? " new" : "");
  b.innerHTML = `${html}<div class="meta">${time}</div>`;
  thread.appendChild(b);
  return b;
}

// ── Sequenz ──
window.addEventListener("DOMContentLoaded", () => {
  // Tag 0 — Bestätigungs-SMS (aus Take 2)
  addDateSep(CONFIG.dates.day0);
  addBubble(
    `<strong>${CONFIG.sender}:</strong> Ihre Meldung wurde aufgenommen. Hier können Sie Angaben ergänzen oder Fotos anfügen:<br><span class="link">flowsight.ch/v/${CONFIG.caseId}?t=${CONFIG.reviewToken.slice(0,8)}</span>`,
    CONFIG.times.sms1,
    false
  );

  // Tag +1 — 24h-Reminder (kommt erst bei showReminder())
  // Tag +2 — Bewertungsanfrage (kommt erst bei showReview())
});

window.showReminder = () => {
  addDateSep(CONFIG.dates.day1);
  addBubble(
    `<strong>${CONFIG.sender}:</strong> Erinnerung — Ihr Termin ist morgen um 09:00 Uhr, Bahnhofstrasse 15. Bei Fragen erreichen Sie uns unter ${CONFIG.brand ? "" : ""}+41 44 505 74 21.`,
    CONFIG.times.sms2,
    true
  );
};

window.showReview = () => {
  addDateSep(CONFIG.dates.day2);
  addBubble(
    `<strong>${CONFIG.sender}:</strong> Vielen Dank für Ihr Vertrauen. Über eine kurze Bewertung freuen wir uns sehr:<br><span class="link">flowsight.ch/r/${CONFIG.caseId}?t=${CONFIG.reviewToken}</span>`,
    CONFIG.times.sms3,
    true
  );
};
</script>
</body>
</html>
