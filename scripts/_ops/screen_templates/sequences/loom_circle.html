<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 200px; height: 200px; background: transparent; overflow: hidden; }
  .circle {
    width: 200px; height: 200px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
</style>
</head>
<body>
<div class="circle"><video id="v" src="{{SRC}}" autoplay muted loop></video></div>
</body>
</html>
