<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brand Cut</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1440px; height: 900px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
    background: radial-gradient(ellipse at center, var(--bg-light) 0%, var(--bg-dark) 80%);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 250ms ease-out forwards, fadeOut 250ms ease-in 950ms forwards;
  }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

  .content { text-align: center; }
  .logo-circle {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -1px;
    margin-bottom: 28px;
    border: 1.5px solid rgba(255,255,255,0.3);
  }
  .firma {
    font-size: 38px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: rgba(255,255,255,0.95);
    margin-bottom: 12px;
  }
  .note {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo-circle" id="logo">—</div>
    <div class="firma" id="firma">—</div>
    <div class="note">Leitsystem</div>
  </div>

<script>
const CONFIG = {
  firma: "{{FIRMA}}",
  brand: "{{BRAND}}"
};

function hexToRgb(h) { const v=h.replace(/^#/,""); const n=parseInt(v,16); return [n>>16&255,n>>8&255,n&255]; }
function adjust(rgb, f) { return `rgb(${rgb.map(v=>Math.max(0,Math.min(255,Math.round(v*f)))).join(",")})`; }
const rgb = hexToRgb(CONFIG.brand || "#0b1220");
document.documentElement.style.setProperty("--bg-light", adjust(rgb, 0.5));
document.documentElement.style.setProperty("--bg-dark", adjust(rgb, 0.15));

const firma = CONFIG.firma || "—";
document.getElementById("firma").textContent = firma;
document.getElementById("logo").textContent = firma.slice(0, 2).toUpperCase();
</script>
</body>
</html>
