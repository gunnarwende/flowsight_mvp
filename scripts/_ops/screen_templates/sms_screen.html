<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 358px; height: 772px;
    font-family: 'SamsungOne', -apple-system, 'Roboto', 'Segoe UI', sans-serif;
    background: #fff; color: #1a1a1a; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── Samsung Status Bar ─────────────────────────────────── */
  .status-bar {
    height: 32px; padding: 6px 16px;
    display: flex; justify-content: space-between; align-items: center;
    background: #fff;
    font-size: 12px; font-weight: 500; color: #1a1a1a;
  }
  .status-left { display: flex; align-items: center; gap: 4px; }
  .status-right { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .battery {
    display: inline-flex; align-items: center; gap: 2px;
  }
  .battery-shell {
    width: 20px; height: 10px; border: 1.5px solid #1a1a1a;
    border-radius: 2px; position: relative; display: inline-block;
  }
  .battery-shell::after {
    content: ''; position: absolute; right: -4px; top: 2px;
    width: 2px; height: 4px; background: #1a1a1a; border-radius: 0 1px 1px 0;
  }
  .battery-fill {
    position: absolute; left: 1px; top: 1px; bottom: 1px;
    background: #4caf50; border-radius: 1px;
  }

  /* ── App Header ─────────────────────────────────────────── */
  .header {
    height: 52px; display: flex; align-items: center;
    padding: 0 14px; border-bottom: 1px solid #e5e5e5;
  }
  .header .back-arrow {
    width: 24px; height: 24px; margin-right: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .header .back-arrow svg { width: 18px; height: 18px; fill: #1a1a1a; }
  .header .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #e0e0e0; display: flex; align-items: center; justify-content: center;
    margin-right: 10px; flex-shrink: 0;
  }
  .header .avatar svg { width: 20px; height: 20px; fill: #999; }
  .header .name { font-size: 16px; font-weight: 500; flex: 1; }
  .header .menu { font-size: 20px; color: #666; }

  /* ── Chat Area ──────────────────────────────────────────── */
  .chat {
    flex: 1; padding: 16px 16px;
    display: flex; flex-direction: column;
  }

  .day-label {
    text-align: center; font-size: 12px; color: #999;
    margin-bottom: 14px; margin-top: 4px;
  }

  .message {
    max-width: 280px;
    background: #e8e8e8;
    border-radius: 18px 18px 18px 6px;
    padding: 10px 14px;
    font-size: 14px; line-height: 1.5;
    color: #1a1a1a;
    margin-bottom: 6px;
    word-wrap: break-word;
  }
  .message a {
    color: #1565c0; text-decoration: none;
    word-break: break-all;
  }

  .link-preview {
    background: #f5f5f5; border-radius: 12px;
    padding: 10px 14px; margin-top: 2px; margin-bottom: 8px;
    max-width: 280px;
    display: flex; align-items: center; gap: 8px;
  }
  .link-preview .spinner-icon {
    font-size: 16px; color: #999;
    animation: spin 2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .link-preview .text { font-size: 12px; color: #666; }

  .system-msg {
    text-align: center; font-size: 11.5px; color: #999;
    margin-top: 16px; padding: 0 24px; line-height: 1.45;
  }
  .system-msg a { color: #1565c0; text-decoration: none; }

  /* ── Samsung Nav Bar ────────────────────────────────────── */
  .nav-bar {
    height: 42px; display: flex; justify-content: center; align-items: center; gap: 80px;
    background: #fff; border-top: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .nav-line { width: 36px; height: 4px; background: #ccc; border-radius: 2px; }
  .nav-square { width: 13px; height: 13px; border: 2px solid #ccc; border-radius: 2px; }
  .nav-tri {
    width: 0; height: 0;
    border-top: 6px solid transparent; border-bottom: 6px solid transparent;
    border-right: 9px solid #ccc;
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-left">
    <span id="clock">08:36</span>
  </div>
  <div class="status-right">
    <span style="font-size:10px; color:#999;">&#x1F507;</span>
    <span style="font-size:9px;">&#x25B2;&#x25BC;</span>
    <div class="battery">
      <div class="battery-shell">
        <div class="battery-fill" style="width:80%"></div>
      </div>
      <span id="batteryPct" style="font-weight:600; font-size:11px;">95</span>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="back-arrow">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </div>
  <div class="avatar">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
  </div>
  <span class="name" id="senderName">Doerfler AG</span>
  <span class="menu">&#x22EE;</span>
</div>

<!-- Chat -->
<div class="chat">
  <div class="day-label" id="dayLabel">Freitag &middot; 19:20</div>

  <div class="message" id="msgBody">
    <span id="senderPrefix">Doerfler AG</span>: Ihre Meldung wurde aufgenommen. Hier können Sie Ihre Angaben ergänzen oder Fotos anfügen:<br>
    <a href="#" id="msgLink">https://flowsight.ch/v/DA-88?t=638655f8414e58dc</a>
  </div>

  <div class="link-preview">
    <span class="spinner-icon">&#x21BB;</span>
    <span class="text">Zum Laden der Vorschau tippen</span>
  </div>

  <div class="system-msg">
    Antwort an diesen Kurzcode nicht möglich. <a href="#">Weitere Informationen</a>
  </div>
</div>

<!-- Nav Bar -->
<div class="nav-bar">
  <div class="nav-line"></div>
  <div class="nav-square"></div>
  <div class="nav-tri"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const sender = params.get('sender') || 'Doerfler AG';
const time = params.get('time') || '15:00';
const clock = params.get('clock') || '08:36';
const caseRef = params.get('case_ref') || 'DA-88';
const token = params.get('token') || '638655f8414e58dc';
const battery = params.get('battery') || '95';

// Day label: compute from current date or accept param
const dayParam = params.get('day_label');
const DAYS_DE = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const dayLabel = dayParam || `${DAYS_DE[new Date().getDay()]} \u00B7 ${time}`;

document.getElementById('senderName').textContent = sender;
document.getElementById('senderPrefix').textContent = sender;
document.getElementById('dayLabel').textContent = dayLabel;
document.getElementById('clock').textContent = clock;
document.getElementById('batteryPct').textContent = battery;
document.getElementById('msgLink').textContent = `https://flowsight.ch/v/${caseRef}?t=${token}`;
document.getElementById('msgLink').href = `https://flowsight.ch/v/${caseRef}?t=${token}`;
</script>
</body>
</html>
