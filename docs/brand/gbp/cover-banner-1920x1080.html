<!DOCTYPE html>
<!--
  FlowSight GBP — Cover/Banner
  Dimension: 1920 × 1080 px (16:9)

  EXPORT: Chrome DevTools → Ctrl+Shift+P → "Capture full size screenshot"
-->
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FlowSight Cover Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }
  body {
    background: linear-gradient(135deg, #1a2744 0%, #0f1a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(212,168,67,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,168,67,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Decorative glow */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .logo-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .logo-text {
    font-size: 96px;
    font-weight: 700;
    color: #d4a843;
    letter-spacing: -2px;
    line-height: 1;
  }
  .signal-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #d4a843;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .tagline {
    font-size: 32px;
    font-weight: 400;
    color: #a3b4cc; /* navy-300 */
    letter-spacing: 0.5px;
    text-align: center;
    max-width: 900px;
    line-height: 1.4;
  }

  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4a843, transparent);
  }

  .features {
    display: flex;
    gap: 60px;
    margin-top: 20px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 14px;
    color: #7b8fb3; /* navy-400 */
    font-size: 20px;
    font-weight: 500;
  }
  .feature-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #d4a843;
    flex-shrink: 0;
  }

  .url {
    position: absolute;
    bottom: 48px;
    font-size: 22px;
    font-weight: 500;
    color: rgba(212,168,67,0.5);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="logo-wrap">
      <span class="logo-text">FlowSight</span>
      <span class="signal-dot"></span>
    </div>

    <div class="divider"></div>

    <div class="tagline">
      KI-gestützte Einsatzsteuerung<br>
      für Sanitär &amp; Heizung
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-dot"></span>
        <span>KI Voice Agent 24/7</span>
      </div>
      <div class="feature">
        <span class="feature-dot"></span>
        <span>Automatische Fallerfassung</span>
      </div>
      <div class="feature">
        <span class="feature-dot"></span>
        <span>Review Management</span>
      </div>
    </div>
  </div>

  <div class="url">flowsight.ch</div>
</body>
</html>
