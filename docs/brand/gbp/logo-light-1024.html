<!DOCTYPE html>
<!--
  FlowSight GBP — Logo (hell, quadratisch)
  Dimension: 1024 × 1024 px

  EXPORT-ANLEITUNG:
  1. Öffne diese Datei in Chrome
  2. F12 → DevTools → Ctrl+Shift+P → "Capture full size screenshot"
  3. Oder: Rechtsklick auf die Seite → Screenshot-Erweiterung
  4. Ergebnis: 1024×1024 PNG
-->
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FlowSight Logo Light 1024</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #faf8f5; /* warm-white */
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  .logo-wrap {
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }
  .logo-text {
    font-size: 128px;
    font-weight: 600;
    color: #1a2744; /* navy-900 */
    letter-spacing: -2px;
    line-height: 1;
  }
  .signal-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #d4a843; /* gold-500 */
    margin-bottom: 12px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <span class="logo-text">FlowSight</span>
    <span class="signal-dot"></span>
  </div>
</body>
</html>
