<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>S3 &mdash; Manual Entry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    width: 390px; height: 844px;
    overflow: hidden;
    background: #111827;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* iOS Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0 28px;
    height: 54px;
  }
  .status-time { font-size: 16px; font-weight: 600; color: #f1f5f9; letter-spacing: -0.02em; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Dimmed Leitzentrale behind */
  .dimmed-bg {
    opacity: 0.25;
    padding: 16px 20px;
  }
  .dimmed-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
  }
  .dimmed-dot { width: 8px; height: 8px; border-radius: 50%; background: #c9a227; }
  .dimmed-text { font-size: 14px; font-weight: 600; color: #f1f5f9; }
  .dimmed-card {
    background: #1a2332; border: 1px solid #2d3748; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 8px;
  }
  .dimmed-card-title { font-size: 13px; color: #94a3b8; }

  /* Overlay */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10;
  }

  /* Bottom Sheet */
  .bottom-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #ffffff;
    border-radius: 20px 20px 0 0;
    z-index: 20;
    padding: 0 0 34px 0;
  }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: #d1d5db;
    margin: 10px auto 0 auto;
  }
  .sheet-header {
    padding: 20px 24px 0 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sheet-title {
    font-size: 20px; font-weight: 700; color: #0f172a;
    letter-spacing: -0.025em;
  }
  .sheet-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: #f1f5f9;
    display: flex; align-items: center; justify-content: center;
  }

  /* Form Fields */
  .form-fields {
    padding: 20px 24px 0 24px;
  }
  .field {
    margin-bottom: 18px;
  }
  .field-label {
    font-size: 12px; font-weight: 600; color: #64748b;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field-input {
    width: 100%;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500; color: #1e293b;
    letter-spacing: -0.01em;
    outline: none;
  }
  .field-row {
    display: flex; gap: 12px;
  }
  .field-row .field { flex: 1; }
  .field-input-desc {
    width: 100%;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 400; color: #475569;
    letter-spacing: -0.01em;
    min-height: 60px;
    resize: none;
    outline: none;
  }
  .priority-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 14px; font-weight: 500; color: #475569;
  }

  /* CTA Button */
  .cta-area {
    padding: 20px 24px 0 24px;
  }
  .cta-btn {
    width: 100%;
    background: #c9a227;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 600;
    letter-spacing: -0.01em;
    border: none; border-radius: 10px;
    padding: 16px 0;
    cursor: pointer;
    text-align: center;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px;
    background: rgba(15,23,42,0.15);
    z-index: 30;
  }
</style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">09:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="#f1f5f9"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="#f1f5f9"/><rect x="9" y="1" width="3" height="11" rx="1" fill="#f1f5f9"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#f1f5f9"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 3.6C10.1 3.6 12 4.4 13.4 5.8L14.8 4.4C13 2.6 10.6 1.5 8 1.5S3 2.6 1.2 4.4L2.6 5.8C4 4.4 5.9 3.6 8 3.6Z" fill="#f1f5f9"/><path d="M8 7.2C9.2 7.2 10.3 7.7 11.1 8.5L12.5 7.1C11.3 5.9 9.7 5.2 8 5.2S4.7 5.9 3.5 7.1L4.9 8.5C5.7 7.7 6.8 7.2 8 7.2Z" fill="#f1f5f9"/><circle cx="8" cy="10.5" r="1.5" fill="#f1f5f9"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(241,245,249,0.35)" fill="none"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#f1f5f9"/><path d="M24 4.5C24.8 4.8 25.5 5.7 25.5 6.5S24.8 8.2 24 8.5V4.5Z" fill="rgba(241,245,249,0.4)"/></svg>
    </div>
  </div>

  <!-- Dimmed background content -->
  <div class="dimmed-bg">
    <div class="dimmed-header">
      <div class="dimmed-dot"></div>
      <span class="dimmed-text">Leitzentrale</span>
    </div>
    <div class="dimmed-card"><div class="dimmed-card-title">GT-042 &middot; Eva Brunner</div></div>
    <div class="dimmed-card"><div class="dimmed-card-title">GT-041 &middot; R. Keller</div></div>
    <div class="dimmed-card"><div class="dimmed-card-title">GT-038 &middot; P. Weber</div></div>
  </div>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Neuer Fall</span>
      <div class="sheet-close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3L11 11M11 3L3 11" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="form-fields">
      <div class="field">
        <div class="field-label">Kunde</div>
        <div class="field-input">R. Keller</div>
      </div>
      <div class="field-row">
        <div class="field">
          <div class="field-label">Kategorie</div>
          <div class="field-input">Wartung</div>
        </div>
        <div class="field">
          <div class="field-label">Priorit&auml;t</div>
          <div class="field-input">
            <span class="priority-badge">Normal</span>
          </div>
        </div>
      </div>
      <div class="field">
        <div class="field-label">Beschreibung</div>
        <div class="field-input-desc">J&auml;hrliche Kontrolle, Termin gew&uuml;nscht</div>
      </div>
    </div>
    <div class="cta-area">
      <div class="cta-btn">Fall anlegen</div>
    </div>
  </div>

  <div class="home-indicator"></div>
</body>
</html>
