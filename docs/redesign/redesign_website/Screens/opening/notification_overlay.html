<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px; height: 120px;
    background: rgba(17, 24, 39, 0.92);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    padding: 16px 18px;
    gap: 12px;
    -webkit-font-smoothing: antialiased;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #c9a227;
    flex-shrink: 0;
  }
  .content { flex: 1; }
  .title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-bottom: 4px;
  }
  .name {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 2px;
  }
  .detail {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
  }
</style>
</head>
<body>
  <div class="dot"></div>
  <div class="content">
    <div class="title">Neue Meldung</div>
    <div class="name">Eva Brunner &middot; Wollishofen</div>
    <div class="detail">Problem vor Ort</div>
  </div>
</body>
</html>
