<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>S8 &mdash; Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    width: 390px; height: 844px;
    overflow: hidden;
    background: #f8fafc;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0 28px; height: 54px;
  }
  .status-time { font-size: 16px; font-weight: 600; color: #1e293b; letter-spacing: -0.02em; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Header */
  .review-header {
    text-align: center;
    padding: 32px 24px 0 24px;
  }
  .header-brand-name {
    font-size: 18px; font-weight: 700; color: #0f172a;
    letter-spacing: -0.025em;
    margin-bottom: 8px;
  }
  .header-gold-line {
    width: 40px; height: 2px;
    background: #c9a227;
    margin: 0 auto;
  }

  /* Info Row */
  .info-row {
    display: flex; justify-content: center; gap: 16px;
    padding: 24px 24px 0 24px;
    flex-wrap: wrap;
  }
  .info-item { text-align: center; }
  .info-label {
    font-size: 10px; font-weight: 600; color: #94a3b8;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .info-value {
    font-size: 13px; font-weight: 500; color: #475569;
  }
  .info-sep {
    width: 1px; background: #e2e8f0;
    align-self: stretch;
  }

  /* Main Content */
  .review-main {
    text-align: center;
    padding: 48px 24px 0 24px;
  }
  .review-question {
    font-size: 26px; font-weight: 700; color: #0f172a;
    letter-spacing: -0.025em;
    margin-bottom: 32px;
    line-height: 1.2;
  }
  .stars-row {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 28px;
  }
  .star-icon {
    width: 44px; height: 44px;
  }
  .thanks-text {
    font-size: 20px; font-weight: 600; color: #10b981;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
  }

  /* Google Section */
  .google-section {
    text-align: center;
    padding: 0 32px;
  }
  .google-prompt {
    font-size: 15px; font-weight: 400; color: #475569;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .google-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #1e293b;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.01em;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }

  /* Powered by */
  .powered {
    position: absolute;
    bottom: 40px; left: 0; right: 0;
    text-align: center;
    font-size: 12px; font-weight: 400; color: #94a3b8;
    letter-spacing: 0.02em;
  }
  .powered span { font-weight: 500; color: #64748b; }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px;
    background: rgba(15,23,42,0.15);
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">09:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="#1e293b"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="#1e293b"/><rect x="9" y="1" width="3" height="11" rx="1" fill="#1e293b"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1e293b"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 3.6C10.1 3.6 12 4.4 13.4 5.8L14.8 4.4C13 2.6 10.6 1.5 8 1.5S3 2.6 1.2 4.4L2.6 5.8C4 4.4 5.9 3.6 8 3.6Z" fill="#1e293b"/><path d="M8 7.2C9.2 7.2 10.3 7.7 11.1 8.5L12.5 7.1C11.3 5.9 9.7 5.2 8 5.2S4.7 5.9 3.5 7.1L4.9 8.5C5.7 7.7 6.8 7.2 8 7.2Z" fill="#1e293b"/><circle cx="8" cy="10.5" r="1.5" fill="#1e293b"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(15,23,42,0.35)" fill="none"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#1e293b"/><path d="M24 4.5C24.8 4.8 25.5 5.7 25.5 6.5S24.8 8.2 24 8.5V4.5Z" fill="rgba(15,23,42,0.4)"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="review-header">
    <div class="header-brand-name">Geb&auml;udetechnik GmbH</div>
    <div class="header-gold-line"></div>
  </div>

  <!-- Info Row -->
  <div class="info-row">
    <div class="info-item">
      <div class="info-label">Kategorie</div>
      <div class="info-value">Allgemein</div>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <div class="info-label">Ort</div>
      <div class="info-value">Wollishofen</div>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <div class="info-label">Datum</div>
      <div class="info-value">27.03.2026</div>
    </div>
  </div>

  <!-- Main -->
  <div class="review-main">
    <div class="review-question">Wie war unser Service?</div>
    <div class="stars-row">
      <svg class="star-icon" viewBox="0 0 44 44" fill="#c9a227"><path d="M22 3l5.5 11.2 12.3 1.8-8.9 8.7 2.1 12.3L22 31.5 10.9 37l2.1-12.3-8.9-8.7 12.3-1.8L22 3z"/></svg>
      <svg class="star-icon" viewBox="0 0 44 44" fill="#c9a227"><path d="M22 3l5.5 11.2 12.3 1.8-8.9 8.7 2.1 12.3L22 31.5 10.9 37l2.1-12.3-8.9-8.7 12.3-1.8L22 3z"/></svg>
      <svg class="star-icon" viewBox="0 0 44 44" fill="#c9a227"><path d="M22 3l5.5 11.2 12.3 1.8-8.9 8.7 2.1 12.3L22 31.5 10.9 37l2.1-12.3-8.9-8.7 12.3-1.8L22 3z"/></svg>
      <svg class="star-icon" viewBox="0 0 44 44" fill="#c9a227"><path d="M22 3l5.5 11.2 12.3 1.8-8.9 8.7 2.1 12.3L22 31.5 10.9 37l2.1-12.3-8.9-8.7 12.3-1.8L22 3z"/></svg>
      <svg class="star-icon" viewBox="0 0 44 44" fill="#c9a227"><path d="M22 3l5.5 11.2 12.3 1.8-8.9 8.7 2.1 12.3L22 31.5 10.9 37l2.1-12.3-8.9-8.7 12.3-1.8L22 3z"/></svg>
    </div>
    <div class="thanks-text">Vielen Dank!</div>
  </div>

  <!-- Google Section -->
  <div class="google-section">
    <div class="google-prompt">W&uuml;rden Sie Ihre Erfahrung auch auf Google teilen?</div>
    <div class="google-btn">
      Auf Google bewerten
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M10 5L13 8L10 11" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div class="powered">Powered by <span>FlowSight</span></div>
  <div class="home-indicator"></div>
</body>
</html>
