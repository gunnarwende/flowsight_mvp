<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>S1 &mdash; Notification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    width: 390px; height: 844px;
    overflow: hidden;
    background: #0a0f1a;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 20%, rgba(30,40,70,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 400px 600px at 80% 60%, rgba(20,30,55,0.4) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 20% 80%, rgba(25,35,60,0.3) 0%, transparent 70%),
      #0a0f1a;
  }
  .content { position: relative; z-index: 1; }

  /* iOS Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0 28px;
    height: 54px;
  }
  .status-time {
    font-size: 16px; font-weight: 600; color: #f1f5f9;
    letter-spacing: -0.02em;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { opacity: 0.9; }

  /* Lock Clock */
  .lock-section {
    text-align: center;
    padding-top: 60px;
  }
  .lock-time {
    font-size: 82px; font-weight: 700; color: #f1f5f9;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .lock-date {
    font-size: 18px; font-weight: 500; color: rgba(241,245,249,0.7);
    margin-top: 6px;
    letter-spacing: -0.01em;
  }

  /* Notification */
  .notification-area {
    padding: 0 16px;
    margin-top: 80px;
  }
  .notification-card {
    background: rgba(30,36,50,0.75);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 16px;
    padding: 0;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
  }
  .notif-accent {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #3b82f6;
    border-radius: 16px 0 0 16px;
  }
  .notif-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px 0 16px;
  }
  .notif-header-left {
    display: flex; align-items: center; gap: 8px;
  }
  .gold-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #c9a227;
    flex-shrink: 0;
  }
  .notif-app-name {
    font-size: 13px; font-weight: 600; color: rgba(241,245,249,0.6);
    letter-spacing: -0.01em;
  }
  .notif-time {
    font-size: 13px; font-weight: 400; color: rgba(241,245,249,0.4);
  }
  .notif-body {
    padding: 8px 16px 14px 16px;
  }
  .notif-title {
    font-size: 15px; font-weight: 600; color: #f1f5f9;
    letter-spacing: -0.02em;
    margin-bottom: 3px;
  }
  .notif-subtitle {
    font-size: 14px; font-weight: 500; color: #e2e8f0;
    margin-bottom: 3px;
  }
  .notif-detail {
    font-size: 14px; font-weight: 400; color: #94a3b8;
    letter-spacing: -0.01em;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px;
    background: rgba(241,245,249,0.25);
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">08:47</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="#f1f5f9"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="#f1f5f9"/><rect x="9" y="1" width="3" height="11" rx="1" fill="#f1f5f9"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#f1f5f9"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 3.6C10.1 3.6 12 4.4 13.4 5.8L14.8 4.4C13 2.6 10.6 1.5 8 1.5S3 2.6 1.2 4.4L2.6 5.8C4 4.4 5.9 3.6 8 3.6Z" fill="#f1f5f9"/><path d="M8 7.2C9.2 7.2 10.3 7.7 11.1 8.5L12.5 7.1C11.3 5.9 9.7 5.2 8 5.2S4.7 5.9 3.5 7.1L4.9 8.5C5.7 7.7 6.8 7.2 8 7.2Z" fill="#f1f5f9"/><circle cx="8" cy="10.5" r="1.5" fill="#f1f5f9"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(241,245,249,0.35)" fill="none"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#f1f5f9"/><path d="M24 4.5C24.8 4.8 25.5 5.7 25.5 6.5S24.8 8.2 24 8.5V4.5Z" fill="rgba(241,245,249,0.4)"/></svg>
    </div>
  </div>

  <!-- Lock Screen -->
  <div class="lock-section">
    <div class="lock-time">08:47</div>
    <div class="lock-date">Donnerstag, 27. M&auml;rz</div>
  </div>

  <!-- Notification -->
  <div class="notification-area">
    <div class="notification-card">
      <div class="notif-accent"></div>
      <div class="notif-header">
        <div class="notif-header-left">
          <div class="gold-dot"></div>
          <span class="notif-app-name">Geb&auml;udetechnik GmbH</span>
        </div>
        <span class="notif-time">jetzt</span>
      </div>
      <div class="notif-body">
        <div class="notif-title">Neue Meldung via Telefon</div>
        <div class="notif-subtitle">Eva Brunner &middot; Dringend</div>
        <div class="notif-detail">Problem vor Ort &mdash; 8038 Wollishofen</div>
      </div>
    </div>
  </div>
</div>
<div class="home-indicator"></div>
</body>
</html>
