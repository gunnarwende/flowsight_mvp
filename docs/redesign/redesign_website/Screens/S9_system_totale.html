<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>S9 &mdash; System Totale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    width: 390px; height: 844px;
    overflow: hidden;
    background: #111827;
    -webkit-font-smoothing: antialiased;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0 28px; height: 54px;
    flex-shrink: 0;
  }
  .status-time { font-size: 16px; font-weight: 600; color: #f1f5f9; letter-spacing: -0.02em; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Flow Diagram */
  .flow-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
    margin-top: -30px;
  }

  .station {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .station-circle {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .circle-white {
    border: 2px solid #475569;
    background: transparent;
  }
  .circle-green {
    border: 2px solid #10b981;
    background: rgba(16,185,129,0.08);
  }
  .circle-gold {
    border: 2px solid #c9a227;
    background: rgba(201,162,39,0.08);
  }
  .station-number {
    font-size: 24px; font-weight: 700; letter-spacing: -0.03em;
    line-height: 1;
  }
  .num-white { color: #f1f5f9; }
  .num-green { color: #10b981; }
  .num-gold { color: #c9a227; }
  .station-label {
    font-size: 14px; font-weight: 600; color: #f1f5f9;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .station-sub {
    font-size: 11px; font-weight: 400; color: #64748b;
    text-align: center;
    margin-top: 2px;
    line-height: 1.3;
  }

  .connector {
    width: 1px; height: 32px;
    background: #2d3748;
    margin: 6px 0;
  }

  /* Tagline */
  .tagline {
    text-align: center;
    padding: 0 40px;
    margin-bottom: 60px;
  }
  .tagline-main {
    font-size: 26px; font-weight: 700; color: #f1f5f9;
    letter-spacing: -0.025em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .tagline-sub {
    font-size: 16px; font-weight: 500; color: #c9a227;
    letter-spacing: -0.01em;
  }

  /* Brand Footer */
  .brand-footer {
    position: absolute;
    bottom: 40px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .gold-dot-sm {
    width: 7px; height: 7px; border-radius: 50%;
    background: #c9a227;
  }
  .brand-footer-text {
    font-size: 13px; font-weight: 500; color: #64748b;
    letter-spacing: -0.01em;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px;
    background: rgba(241,245,249,0.15);
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">09:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="#f1f5f9"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="#f1f5f9"/><rect x="9" y="1" width="3" height="11" rx="1" fill="#f1f5f9"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#f1f5f9"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 3.6C10.1 3.6 12 4.4 13.4 5.8L14.8 4.4C13 2.6 10.6 1.5 8 1.5S3 2.6 1.2 4.4L2.6 5.8C4 4.4 5.9 3.6 8 3.6Z" fill="#f1f5f9"/><path d="M8 7.2C9.2 7.2 10.3 7.7 11.1 8.5L12.5 7.1C11.3 5.9 9.7 5.2 8 5.2S4.7 5.9 3.5 7.1L4.9 8.5C5.7 7.7 6.8 7.2 8 7.2Z" fill="#f1f5f9"/><circle cx="8" cy="10.5" r="1.5" fill="#f1f5f9"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(241,245,249,0.35)" fill="none"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#f1f5f9"/><path d="M24 4.5C24.8 4.8 25.5 5.7 25.5 6.5S24.8 8.2 24 8.5V4.5Z" fill="rgba(241,245,249,0.4)"/></svg>
    </div>
  </div>

  <!-- Flow Diagram -->
  <div class="flow-container">
    <div class="station">
      <div class="station-circle circle-white">
        <span class="station-number num-white">3</span>
      </div>
      <div class="station-label">Eingang</div>
      <div class="station-sub">Telefon, Website, direkt</div>
    </div>

    <div class="connector"></div>

    <div class="station">
      <div class="station-circle circle-white">
        <span class="station-number num-white">4</span>
      </div>
      <div class="station-label">Bei uns</div>
      <div class="station-sub">Geplant, zugewiesen, in Arbeit</div>
    </div>

    <div class="connector"></div>

    <div class="station">
      <div class="station-circle circle-green">
        <span class="station-number num-green">15</span>
      </div>
      <div class="station-label">Erledigt</div>
      <div class="station-sub">Dokumentiert, abgeschlossen</div>
    </div>

    <div class="connector"></div>

    <div class="station">
      <div class="station-circle circle-gold">
        <span class="station-number num-gold">4.8<span style="font-size:14px;">&#9733;</span></span>
      </div>
      <div class="station-label">Bewertung</div>
      <div class="station-sub">Google-Sterne f&uuml;r gute Arbeit</div>
    </div>
  </div>

  <!-- Tagline -->
  <div class="tagline">
    <div class="tagline-main">Ein Leitsystem.</div>
    <div class="tagline-sub">Vom Eingang bis zur Bewertung.</div>
  </div>

  <!-- Brand Footer -->
  <div class="brand-footer">
    <div class="gold-dot-sm"></div>
    <span class="brand-footer-text">FlowSight</span>
  </div>

  <div class="home-indicator"></div>
</body>
</html>
