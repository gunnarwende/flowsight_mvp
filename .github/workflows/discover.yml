name: Go – Betriebe finden (Discovery)

# Das "Go" auf dem Schwungrad: findet <count> Sanitär-Betriebe in <gemeinde>
# (Google Places, scout.mjs) und schreibt die besten additiv in die leads-DB
# (discover_to_leads.mjs — nur neue place_id, bestehende Zeilen unangetastet).
# Läuft in CI mit vollem Key-Zugriff; das Handy löst nur aus.

on:
  workflow_dispatch:
    inputs:
      gemeinde:
        description: "Ort, z. B. Sirnach — LEER = ganzer Kanton (Sweep)"
        required: false
        type: string
        default: ""
      kanton:
        description: "Kanton (voll, z. B. Thurgau)"
        required: true
        type: string
      count:
        description: "Anzahl Betriebe (nur im Modus 'jagen')"
        required: true
        type: choice
        default: "20"
        options:
          - "10"
          - "20"
          - "30"
          - "40"
      mode:
        description: "jagen = N kleine (1–3) finden+crawlen · vollerfassung = ALLE Sanitär-Betriebe parken (alle Größen, kein Crawl)"
        required: false
        type: choice
        default: "jagen"
        options:
          - "jagen"
          - "vollerfassung"

permissions:
  contents: read

# Sicherheitsnetz gegen Doppel-Go: ein zweiter Lauf wartet, bis der erste fertig
# ist (kill den laufenden NICHT — die Anreicherung soll durchlaufen).
concurrency:
  group: discover-go
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependencies installieren (src/web)
        run: cd src/web && npm ci --ignore-scripts

      # Playwright-Browser cachen → Setup von ~10 auf ~2 Min, kein Timeout-Race mehr.
      - name: Playwright-Browser cachen
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      # Playwright früh installieren — der Sweep crawlt INLINE (Größe pro Firma).
      # Bei Cache-Hit nur noch OS-Deps, kein 150-MB-Download.
      - name: Playwright Chromium installieren
        continue-on-error: true
        run: cd src/web && npx playwright install --with-deps chromium

      - name: node_modules an Repo-Wurzel verlinken (bare playwright-import)
        continue-on-error: true
        run: ln -s src/web/node_modules node_modules

      # ── Einzel-Ort (gemeinde gesetzt): bewährter Pfad, unverändert ──
      - name: Einzel-Ort suchen (Google Places)
        if: ${{ inputs.gemeinde != '' && inputs.mode != 'vollerfassung' }}
        env:
          GEMEINDE: ${{ inputs.gemeinde }}
          KANTON: ${{ inputs.kanton }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
        run: node scripts/_ops/scout.mjs --gemeinde "$(echo "$GEMEINDE $KANTON" | sed 's/[[:space:]]*$//')"

      - name: "Einzel-Ort: Top-N additiv in die Kontaktliste"
        if: ${{ inputs.gemeinde != '' && inputs.mode != 'vollerfassung' }}
        env:
          GEMEINDE: ${{ inputs.gemeinde }}
          COUNT: ${{ inputs.count }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_to_leads.mjs --gemeinde "$GEMEINDE" --count "$COUNT" --execute

      # ── Kanton-Sweep (gemeinde leer): OUTPUT-basiert — sammelt <count> NEUE
      #    1–3-Betriebe (kleine Firmen zuerst, Früh-Abbruch bei >15), crawlt inline.
      #    Nahtloser Resume (Frontier). BLEIBT STRIKT IM GEWÄHLTEN KANTON (kein
      #    Cross-Kanton-Roll — falsche Region wäre verheerend). Stop = Ziel erreicht;
      #    Zeit nur Sicherheitsnetz. Skript-Budget 45 Min; Job-Timeout 60. ──
      - name: "Kanton-Sweep: bis N kleine Betriebe (1–3)"
        if: ${{ inputs.gemeinde == '' && inputs.mode != 'vollerfassung' }}
        env:
          KANTON: ${{ inputs.kanton }}
          COUNT: ${{ inputs.count }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_targeted.mjs --kanton "$KANTON" --target "$COUNT" --minutes 45 --execute

      # ── VOLLERFASSUNG (locate-only): parkt JEDEN Sanitär-Betrieb des Kantons
      #    (alle Größen), region-/branchen-sauber, OHNE Crawl → schnell, Größe bleibt
      #    „offen". Kein 1–3-Ziel-Stop; läuft bis Zeitbudget, Frontier rückt vor.
      #    So steht die komplette Landkarte, bevor man segmentweise anreichert. ──
      - name: "Vollerfassung: alle Sanitär-Betriebe parken (kein Crawl)"
        if: ${{ inputs.mode == 'vollerfassung' }}
        env:
          KANTON: ${{ inputs.kanton }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_targeted.mjs --kanton "$KANTON" --locate-only --minutes 45 --execute

      # ── Anreicherung (Best-Effort): NUR Einzel-Ort-Pfad. Der Sweep crawlt schon
      #    inline → kein zweiter, redundanter Crawl-Durchlauf (spart ~15 Min). ──
      - name: Neue Leads anreichern (Inhaber / E-Mail / Größe)
        if: ${{ inputs.gemeinde != '' && inputs.mode != 'vollerfassung' }}
        continue-on-error: true
        env:
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/enrich_new_leads.mjs --limit 20
