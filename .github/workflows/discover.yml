name: Go – Betriebe finden (Discovery)

# Das "Go" auf dem Schwungrad: findet <count> Sanitär-Betriebe in <gemeinde>
# (Google Places, scout.mjs) und schreibt die besten additiv in die leads-DB
# (discover_to_leads.mjs — nur neue place_id, bestehende Zeilen unangetastet).
# Läuft in CI mit vollem Key-Zugriff; das Handy löst nur aus.

on:
  workflow_dispatch:
    inputs:
      gemeinde:
        description: "Ort, z. B. Sirnach — LEER = ganzer Kanton (Sweep)"
        required: false
        type: string
        default: ""
      kanton:
        description: "Kanton (voll, z. B. Thurgau)"
        required: true
        type: string
      count:
        description: "Anzahl Betriebe"
        required: true
        type: choice
        default: "20"
        options:
          - "10"
          - "20"
          - "30"
          - "40"

permissions:
  contents: read

# Sicherheitsnetz gegen Doppel-Go: ein zweiter Lauf wartet, bis der erste fertig
# ist (kill den laufenden NICHT — die Anreicherung soll durchlaufen).
concurrency:
  group: discover-go
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependencies installieren (src/web)
        run: cd src/web && npm ci --ignore-scripts

      # Playwright früh installieren — der Sweep crawlt jetzt INLINE (Größe pro Firma),
      # nicht erst der Anreicherungs-Step danach.
      - name: Playwright Chromium installieren
        continue-on-error: true
        run: cd src/web && npx playwright install --with-deps chromium

      - name: node_modules an Repo-Wurzel verlinken (bare playwright-import)
        continue-on-error: true
        run: ln -s src/web/node_modules node_modules

      # ── Einzel-Ort (gemeinde gesetzt): bewährter Pfad, unverändert ──
      - name: Einzel-Ort suchen (Google Places)
        if: ${{ inputs.gemeinde != '' }}
        env:
          GEMEINDE: ${{ inputs.gemeinde }}
          KANTON: ${{ inputs.kanton }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
        run: node scripts/_ops/scout.mjs --gemeinde "$(echo "$GEMEINDE $KANTON" | sed 's/[[:space:]]*$//')"

      - name: "Einzel-Ort: Top-N additiv in die Kontaktliste"
        if: ${{ inputs.gemeinde != '' }}
        env:
          GEMEINDE: ${{ inputs.gemeinde }}
          COUNT: ${{ inputs.count }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_to_leads.mjs --gemeinde "$GEMEINDE" --count "$COUNT" --execute

      # ── Kanton-Sweep (gemeinde leer): OUTPUT-basiert — sammelt <count> NEUE
      #    1–3-Betriebe (kleine Firmen zuerst, Früh-Abbruch bei >15), crawlt inline.
      #    Nahtloser Resume (Frontier) + rollt bei Bedarf in den nächsten Kanton.
      #    Eigentlicher Stop = Ziel (<count> 1–3) erreicht; die Zeit ist nur ein
      #    Sicherheitsnetz. Skript-Budget 50 Min; Job-Timeout 60 (Setup ~5 Min +
      #    Puffer). GitHub-Hartlimit pro Job = 6 h. ──
      - name: "Kanton-Sweep: bis N kleine Betriebe (1–3)"
        if: ${{ inputs.gemeinde == '' }}
        env:
          KANTON: ${{ inputs.kanton }}
          COUNT: ${{ inputs.count }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_targeted.mjs --kanton "$KANTON" --target "$COUNT" --minutes 50 --execute

      # ── Anreicherung (Best-Effort): füllt noch leere Leads nach (v.a. Einzel-Ort-
      #    Pfad; beim Sweep meist schon inline erledigt). Nie rot machen. ──
      - name: Neue Leads anreichern (Inhaber / E-Mail / Größe)
        continue-on-error: true
        env:
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/enrich_new_leads.mjs --limit 20
