name: Go – Betriebe finden (Discovery)

# Das "Go" auf dem Schwungrad: findet <count> Sanitär-Betriebe in <gemeinde>
# (Google Places, scout.mjs) und schreibt die besten additiv in die leads-DB
# (discover_to_leads.mjs — nur neue place_id, bestehende Zeilen unangetastet).
# Läuft in CI mit vollem Key-Zugriff; das Handy löst nur aus.

on:
  workflow_dispatch:
    inputs:
      gemeinde:
        description: "Ort, z. B. Sirnach — LEER = ganzer Kanton (Sweep)"
        required: false
        type: string
        default: ""
      kanton:
        description: "Kanton (voll, z. B. Thurgau)"
        required: true
        type: string
      count:
        description: "Anzahl Betriebe"
        required: true
        type: choice
        default: "20"
        options:
          - "10"
          - "20"
          - "30"
          - "40"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependencies installieren (src/web)
        run: cd src/web && npm ci --ignore-scripts

      # ── Einzel-Ort (gemeinde gesetzt): bewährter Pfad, unverändert ──
      - name: Einzel-Ort suchen (Google Places)
        if: ${{ inputs.gemeinde != '' }}
        env:
          GEMEINDE: ${{ inputs.gemeinde }}
          KANTON: ${{ inputs.kanton }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
        # Kanton in die Suchquery (disambiguiert gleichnamige Orte); für die
        # DB-Zuordnung zählt unten die saubere Gemeinde.
        run: node scripts/_ops/scout.mjs --gemeinde "$(echo "$GEMEINDE $KANTON" | sed 's/[[:space:]]*$//')"

      - name: "Einzel-Ort: Top-N additiv in die Kontaktliste"
        if: ${{ inputs.gemeinde != '' }}
        env:
          GEMEINDE: ${{ inputs.gemeinde }}
          COUNT: ${{ inputs.count }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_to_leads.mjs --gemeinde "$GEMEINDE" --count "$COUNT" --execute

      # ── Kanton-Sweep (gemeinde leer): noch nicht erfasste Orte der Reihe nach ──
      - name: Kanton-Sweep (ganzer Kanton)
        if: ${{ inputs.gemeinde == '' }}
        env:
          KANTON: ${{ inputs.kanton }}
          COUNT: ${{ inputs.count }}
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/discover_sweep.mjs --kanton "$KANTON" --count "$COUNT" --execute

      # ── Anreicherung (Best-Effort): Websites der neuen Leads crawlen →
      #    Inhaber/Mail/Größe. Darf den Go-Lauf nie rot machen (Discovery zählt). ──
      - name: Playwright Chromium installieren
        continue-on-error: true
        run: cd src/web && npx playwright install --with-deps chromium

      - name: node_modules an Repo-Wurzel verlinken (bare playwright-import)
        continue-on-error: true
        run: ln -s src/web/node_modules node_modules

      - name: Neue Leads anreichern (Inhaber / E-Mail / Größe)
        continue-on-error: true
        env:
          GOOGLE_SCOUT_KEY: ${{ secrets.GOOGLE_SCOUT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/_ops/enrich_new_leads.mjs --limit 12
