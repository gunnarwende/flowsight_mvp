name: Ops Doctor

# On-demand, READ-ONLY health check across all live systems. Built so the
# founder can run a full diagnosis from the phone (via Claude / GitHub UI)
# while away from the laptop — no secrets ever leave GitHub, every run is
# audited, and the run's own conclusion (green/red) signals overall health
# at a glance in the Actions list.
#
# Checks (all read-only — nothing is mutated):
#   1. Deployed app   -> GET {APP_URL}/api/health  (Vercel alive + Supabase DB + Resend key)
#   2. Retell voice   -> GET /list-agents          (flags any agent with is_published=false)
#   3. Resend email   -> GET /domains              (flags any domain not "verified")
#
# Exit policy: hard-fail (red run) ONLY on a CRITICAL finding
#   (app down, DB fail, or an unpublished Retell agent — the classic silent
#   routing failure). Soft warnings stay green. So a red Ops Doctor run = act now.

on:
  workflow_dispatch: {}

concurrency:
  group: ops-doctor
  cancel-in-progress: false

jobs:
  doctor:
    name: diagnose
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
      summary: ${{ steps.run.outputs.summary }}
    steps:
      - name: Run diagnostics
        id: run
        env:
          APP_URL: ${{ secrets.APP_URL }}
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -uo pipefail
          CRIT=0          # critical findings -> red run
          WARN=0          # soft findings -> green run, but noted
          LINES=""        # human-readable report (also goes to Telegram)

          add()  { LINES="${LINES}$1"$'\n'; echo -e "$1"; }

          # ── 1. Deployed app (Vercel + Supabase + Resend presence) ──────────
          add "── App / DB / Mail (${APP_URL:-<APP_URL unset>}) ──"
          if [ -z "${APP_URL:-}" ]; then
            add "🔴 APP_URL secret not set"; CRIT=$((CRIT+1))
          else
            H=$(curl -sS -m 30 -w "\n%{http_code}" "${APP_URL}/api/health" 2>/dev/null || echo $'\n000')
            CODE=$(echo "$H" | tail -1); BODY=$(echo "$H" | sed '$d')
            if [ "$CODE" = "200" ]; then
              OK=$(echo "$BODY" | jq -r '.ok // false')
              DB=$(echo "$BODY" | jq -r '.db // "?"')
              MAIL=$(echo "$BODY" | jq -r '.email // "?"')
              ENVN=$(echo "$BODY" | jq -r '.env // "?"')
              add "   app: up (env=${ENVN})"
              if [ "$DB" = "ok" ]; then add "   db: ok"; else add "🔴 db: ${DB}"; CRIT=$((CRIT+1)); fi
              if [ "$MAIL" = "ok" ]; then add "   email: key present"; else add "🟡 email: ${MAIL}"; WARN=$((WARN+1)); fi
              [ "$OK" = "true" ] || WARN=$((WARN+1))
            else
              add "🔴 app health unreachable (HTTP ${CODE})"; CRIT=$((CRIT+1))
            fi
          fi

          # ── 2. Retell agents — is_published (silent routing failure guard) ─
          add ""
          add "── Retell agents ──"
          if [ -z "${RETELL_API_KEY:-}" ]; then
            add "🟡 RETELL_API_KEY secret not set — skipped"; WARN=$((WARN+1))
          else
            R=$(curl -sS -m 30 -w "\n%{http_code}" \
                  -H "Authorization: Bearer ${RETELL_API_KEY}" \
                  "https://api.retellai.com/list-agents" 2>/dev/null || echo $'\n000')
            RC=$(echo "$R" | tail -1); RB=$(echo "$R" | sed '$d')
            if [ "$RC" = "200" ]; then
              N=$(echo "$RB" | jq 'length')
              add "   ${N} agent(s) found"
              # list unpublished agents (is_published=false)
              UNPUB=$(echo "$RB" | jq -r '.[] | select(.is_published != true) | .agent_name // .agent_id')
              if [ -n "$UNPUB" ]; then
                while IFS= read -r a; do add "🔴 UNPUBLISHED: ${a}"; CRIT=$((CRIT+1)); done <<< "$UNPUB"
              else
                add "   all agents published ✓"
              fi
            else
              add "🟡 Retell API unreachable (HTTP ${RC}) — transient?"; WARN=$((WARN+1))
            fi
          fi

          # ── 3. Resend domains — verified? ──────────────────────────────────
          add ""
          add "── Resend domains ──"
          if [ -z "${RESEND_API_KEY:-}" ]; then
            add "🟡 RESEND_API_KEY secret not set — skipped"; WARN=$((WARN+1))
          else
            D=$(curl -sS -m 30 -w "\n%{http_code}" \
                  -H "Authorization: Bearer ${RESEND_API_KEY}" \
                  "https://api.resend.com/domains" 2>/dev/null || echo $'\n000')
            DC=$(echo "$D" | tail -1); DB2=$(echo "$D" | sed '$d')
            if [ "$DC" = "200" ]; then
              echo "$DB2" | jq -r '.data[]? | "\(.name)=\(.status)"' | while IFS= read -r row; do :; done
              ROWS=$(echo "$DB2" | jq -r '.data[]? | "\(.name)=\(.status)"')
              if [ -z "$ROWS" ]; then
                add "🟡 no domains returned";
              else
                while IFS= read -r row; do
                  st="${row#*=}"
                  if [ "$st" = "verified" ]; then add "   ${row} ✓"; else add "🟡 ${row}"; fi
                done <<< "$ROWS"
              fi
            else
              add "🟡 Resend API unreachable (HTTP ${DC})"; WARN=$((WARN+1))
            fi
          fi

          # ── Verdict ────────────────────────────────────────────────────────
          add ""
          if [ "$CRIT" -gt 0 ]; then
            VERDICT="🔴 ${CRIT} critical, ${WARN} warning(s)"
          elif [ "$WARN" -gt 0 ]; then
            VERDICT="🟡 healthy, ${WARN} warning(s)"
          else
            VERDICT="✅ all systems healthy"
          fi
          add "$VERDICT"

          # export for notify job (multiline-safe)
          {
            echo "status=${VERDICT}"
            echo "summary<<EOF"
            echo "$LINES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # red run only on critical
          [ "$CRIT" -eq 0 ] || exit 1

  notify:
    name: telegram-notify
    runs-on: ubuntu-latest
    needs: [doctor]
    if: always()
    steps:
      - name: Send report
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT: ${{ needs.doctor.result }}
          VERDICT: ${{ needs.doctor.outputs.status }}
          REPORT: ${{ needs.doctor.outputs.summary }}
        run: |
          [ -n "${BOT_TOKEN:-}" ] && [ -n "${CHAT_ID:-}" ] || { echo "Telegram not configured — skip"; exit 0; }
          HEAD="🩺 Ops Doctor — ${VERDICT:-result: $RESULT}"
          TEXT="${HEAD}

          ${REPORT:-(no report)}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -m 20 -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode text="${TEXT}" \
            -d disable_web_page_preview=true >/dev/null || echo "::warning::Telegram send failed"
