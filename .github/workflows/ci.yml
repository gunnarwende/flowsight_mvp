name: CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - run: npm ci

      - run: npx eslint . --max-warnings 0

  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - run: npm ci

      - run: npx next build
        env:
          # Placeholders — build needs these to compile, not to run.
          # Real values live in Vercel Env (SSOT). Never leak here.
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder"
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_APP_URL: "https://preview.vercel.app"
          SENTRY_AUTH_TOKEN: ""

  notify:
    name: telegram-notify
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINT: ${{ needs.lint.result }}
          BUILD: ${{ needs.build.result }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "$LINT" = "success" ] && [ "$BUILD" = "success" ]; then
            ICON="✅"
            STATUS="CI passed — ready for review"
          else
            ICON="❌"
            PARTS=""
            [ "$LINT" != "success" ] && PARTS="lint ($LINT)"
            [ "$BUILD" != "success" ] && PARTS="${PARTS:+$PARTS, }build ($BUILD)"
            STATUS="CI failed: $PARTS"
          fi

          SAFE_BRANCH=$(echo "$PR_BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          PREVIEW="https://flowsight-mvp-git-${SAFE_BRANCH}-gunnarwende.vercel.app"

          TEXT="${ICON} PR #${PR_NUM}: ${PR_TITLE}
          ${STATUS}

          Branch: ${PR_BRANCH}
          Author: ${PR_AUTHOR}
          Preview: ${PREVIEW}
          PR: ${PR_URL}"

          # Post to Telegram — log HTTP status + body for debugging (token is masked by GitHub)
          HTTP_CODE=$(curl -sS -o /tmp/tg_response.txt -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d disable_web_page_preview=true)

          echo "Telegram HTTP status: ${HTTP_CODE}"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Telegram response:"
            cat /tmp/tg_response.txt
            exit 1
          fi
