name: BigBen Voice Daily Refresh

# LIVE-CUSTOMER-KRITISCH. Big Ben Pub (Paul, Oberrieden) ist FlowSights ERSTER
# zahlender Live-Kunde (converted 14.04.2026, Barter-Deal). Voice EN+DE produktiv
# unter +41 44 505 48 18. Kundenakte: docs/customers/bigben-pub/status.md.
#
# Dieser Workflow hält Lisa aktuell: heutiges/morgiges Datum + Events-Liste, und
# published zu Retell. Lisa MUSS immer das korrekte Datum sprechen. Ein Fehlschlag
# trifft einen echten Kunden — NICHT ignorieren, zeitnah fixen.
#
# 3× pro Tag (off-the-hour), damit ein einzelner ausgelassener GitHub-Actions-Run
# die Datums-Garantie nicht bricht.
on:
  schedule:
    - cron: "13 5 * * *"   # 05:13 UTC = 06:13 CET / 07:13 CEST  (vor Pub-Öffnung)
    - cron: "13 11 * * *"  # 11:13 UTC = 12:13 CET / 13:13 CEST  (Mittags-Catch-up)
    - cron: "13 17 * * *"  # 17:13 UTC = 18:13 CET / 19:13 CEST  (früher-Abend-Catch-up)
  workflow_dispatch: {}

jobs:
  refresh:
    name: refresh-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: cd src/web && npm ci

      - name: Run BigBen voice daily refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
        run: |
          # set +e + tee: Das Skript-Ergebnis wird ausgewertet, OHNE den Step bei
          # node!=0 sofort abzubrechen. Der alte Aufbau (`OUTPUT=$(node …)` unter dem
          # GitHub-Default `bash -e`) brach beim ersten Fehler ab, BEVOR die Ausgabe
          # geloggt wurde → "failed" ganz ohne Grund. tee schreibt die echte
          # Fehlermeldung live ins Actions-Log.
          set +e
          node scripts/_ops/bigben_voice_daily_refresh.mjs 2>&1 | tee /tmp/bigben_refresh.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::BigBen voice daily refresh failed (exit $STATUS) — echte Ursache siehe Log oben."
          fi
          exit $STATUS

      # Telegram-Benachrichtigungen entfernt 21.06. (Founder nutzt Telegram nicht mehr).
      # Status/Fehler sind im Actions-Log sichtbar (oben) + GitHub schickt bei Fehlschlag
      # ohnehin eine E-Mail an den Repo-Owner.
