name: Morning Report

on:
  # GitHub-SCHEDULE entfernt (MR4, 22.06.): lief hier chronisch 3–5 h zu spät.
  # Getriggert wird der Report jetzt PÜNKTLICH von aussen via workflow_dispatch —
  # durch /api/cron/morning-report (Vercel Cron bzw. externer Cron). dispatch
  # startet in Sekunden, daher minutengenau. Manuell weiterhin auslösbar.
  workflow_dispatch: {}

jobs:
  report:
    name: morning-report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: cd src/web && npm ci

      - name: Run morning report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}
          # RESEND_API_KEY für den internen Health-Selbstcheck (resendOk). Ohne ihn
          # meldete der Report fälschlich "System: bitte prüfen — E-Mail (Resend)",
          # obwohl der Versand unten sauber lief (Resend 200). 21.06.-Fehlalarm-Fix.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          # Schreibt /tmp/morning_report.{subject,txt,html} + loggt den Report.
          node scripts/_ops/morning_report.mjs || true
          # Fallbacks, falls der Lauf vor dem Schreiben abbrach (Report darf nie ganz fehlen).
          [ -s /tmp/morning_report.subject ] || printf 'FlowSight · Tagesüberblick' > /tmp/morning_report.subject
          [ -s /tmp/morning_report.txt ] || printf 'Report konnte nicht erzeugt werden — bitte Actions-Logs prüfen.' > /tmp/morning_report.txt
          [ -s /tmp/morning_report.html ] || cp /tmp/morning_report.txt /tmp/morning_report.html

      # E-Mail TÄGLICH (Founder nutzt Outlook). Severity + Grund stehen im Betreff.
      # Telegram-Versand wurde am 21.06. entfernt (Founder will Telegram nicht mehr).
      - name: Send Email (daily)
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FOUNDER_EMAIL: ${{ secrets.FOUNDER_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$FOUNDER_EMAIL" ]; then
            echo "Missing RESEND_API_KEY or FOUNDER_EMAIL — skipping email"
            exit 0
          fi
          SUBJECT=$(cat /tmp/morning_report.subject)

          # html/text als --rawfile = robust gegen Sonderzeichen/Zeilenumbrüche (kein sed-Gebastel).
          PAYLOAD=$(jq -n \
            --arg from "no-reply@flowsight.ch" \
            --arg to "$FOUNDER_EMAIL" \
            --arg subject "$SUBJECT" \
            --rawfile html /tmp/morning_report.html \
            --rawfile text /tmp/morning_report.txt \
            '{from: $from, to: $to, subject: $subject, html: $html, text: $text}')

          HTTP_CODE=$(curl -sS -o /tmp/resend_response.txt -w "%{http_code}" \
            -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Resend HTTP status: ${HTTP_CODE}"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Resend response:"
            cat /tmp/resend_response.txt
          fi
