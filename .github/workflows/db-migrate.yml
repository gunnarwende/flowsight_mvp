name: DB Migrate

# Wendet die SQL-Migrationen aus supabase/migrations/ server-seitig an.
# Vom Handy per workflow_dispatch ausloesbar. Secret bleibt im Runner, nie in der
# Sandbox. GATED: environment "production" = Required-Reviewer (dein Ein-Tap).
#
# Voraussetzung fuer das echte Anwenden (dry_run=false):
#   Repo-Secret SUPABASE_DB_URL (Supabase-Dashboard -> Settings -> Database ->
#   Connection string / URI, mit Passwort). Im GitHub-Web hinterlegen
#   (Settings -> Secrets and variables -> Actions), NICHT ueber einen Agenten.
# Dry-Run (default) braucht KEIN Secret und macht KEINEN DB-Zugriff (nur listen).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = nur anzeigen, was angewendet wuerde (kein DB-Zugriff). false = wirklich anwenden."
        required: true
        type: boolean
        default: true

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Migrations-Dateien auflisten
        run: |
          echo "── supabase/migrations/ ──"
          ls -1 supabase/migrations/*.sql 2>/dev/null || echo "(keine Migrations-Dateien gefunden)"

      - name: Dry-run (kein DB-Zugriff)
        if: ${{ inputs.dry_run }}
        run: |
          echo "[DRY-RUN] Kein DB-Zugriff, keine Aenderung."
          echo "Bei dry_run=false wuerden die obigen Migrationen via 'supabase db push' angewendet"
          echo "(braucht Repo-Secret SUPABASE_DB_URL). Migrations-Tracking laeuft ueber"
          echo "supabase_migrations.schema_migrations — bereits angewandte werden uebersprungen."

      - name: Supabase CLI
        if: ${{ !inputs.dry_run }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migrationen anwenden (supabase db push)
        if: ${{ !inputs.dry_run }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL ist nicht gesetzt. Secret im GitHub-Web hinterlegen (Settings -> Secrets and variables -> Actions). Wert: Supabase-Connection-String mit Passwort. Niemals ueber einen Agenten setzen."
            exit 1
          fi
          echo "Wende ausstehende Migrationen an (bereits angewandte werden via schema_migrations uebersprungen) …"
          supabase db push --db-url "$SUPABASE_DB_URL"
          echo "✅ db push durch."

      - name: Telegram-Notiz
        if: ${{ always() }}
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT: ${{ job.status }}
          DRY: ${{ inputs.dry_run }}
        run: |
          [ -n "${BOT_TOKEN:-}" ] && [ -n "${CHAT_ID:-}" ] || { echo "(kein Telegram-Secret — skip)"; exit 0; }
          MODE=$([ "$DRY" = "true" ] && echo "DRY-RUN" || echo "APPLY")
          ICON=$([ "$RESULT" = "success" ] && echo "🗄️✅" || echo "🗄️❌")
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${ICON} DB Migrate (${MODE}): ${RESULT}" \
            -d disable_web_page_preview=true >/dev/null || true
