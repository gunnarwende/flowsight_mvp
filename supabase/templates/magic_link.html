<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ihr Anmeldecode</title>
</head>
<body style="margin:0; padding:0; background-color:#f8fafc; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8fafc; padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="420" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#1e293b; padding:24px 32px;">
              <p style="margin:0; color:#ffffff; font-size:18px; font-weight:700;">Leitstand</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 8px; color:#334155; font-size:15px;">
                Ihr Anmeldecode:
              </p>
              <!-- OTP Code -->
              <p style="margin:16px 0 24px; text-align:center;">
                <span style="display:inline-block; background-color:#f1f5f9; border:2px solid #cbd5e1; border-radius:8px; padding:12px 28px; font-size:32px; font-weight:700; letter-spacing:8px; color:#0f172a; font-family:'Courier New', monospace;">
                  {{ .Token }}
                </span>
              </p>
              <p style="margin:0 0 4px; color:#64748b; font-size:13px;">
                Geben Sie diesen Code auf der Anmeldeseite ein.
              </p>
              <p style="margin:0; color:#94a3b8; font-size:12px;">
                Der Code ist 60 Minuten gültig. Falls Sie diese Anmeldung nicht angefordert haben, können Sie diese E-Mail ignorieren.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px; border-top:1px solid #f1f5f9;">
              <p style="margin:0; color:#cbd5e1; font-size:11px;">
                Diese E-Mail wurde automatisch versendet.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
